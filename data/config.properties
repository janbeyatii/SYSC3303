# Firefighting Drone Swarm - Configuration
# Number of drones to start (configurable at startup, per project spec - no manual add during simulation)
numDrones=2
# Simulation speed for drones: 1.0=real time, 0.1=10x faster, 0.01=100x faster
droneTimeScale=0.10
# Scheduler host for drones to connect to
schedulerHost=127.0.0.1
# Scheduler port
schedulerPort=5000
# Agent (water/foam) capacity per drone in litres (spec: configurable)
agentCapacity=100
